services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sudipta4docker/dd_internship:frontend
    ports:
      - "4200:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sudipta4docker/dd_internship:backend
    ports:
      - "8081:8081"
    depends_on:
      - db

  db:
    image: mongo:6
    ports:
      - "27017:27017"
